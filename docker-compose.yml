services:
  # --- BACKBONE: MESSAGING & STATE ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rmq_broker
    ports:
      - "5672:5672"   # AMQP Protocol
      - "15672:15672" # Management UI
    networks:
      - data_plane

  redis:
    image: redis:7-alpine
    container_name: redis_state
    command: redis-server
    ports:
      - "6379:6379"
    networks:
      - data_plane
      - control_plane

  mongodb:
    image: mongo:latest
    container_name: mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    networks:
      - data_plane

  # --- OBSERVABILITY ---
  #grafana:
  #  image: grafana/grafana-oss
  #  container_name: grafana_viz
  #  ports:
  #    - "3000:3000"
  #  environment:
  #    - GF_SECURITY_ADMIN_PASSWORD=admin
  #  networks:
  #    - control_plane

  auth-service:
    build: 
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    environment:
      - MONGO_URL=mongodb://mongodb:27017/auth_db
      - JWT_SECRET=eVOo6GoZns6NVDsZ7lCZ95XOa17PKzAj0+wsmZqHi3I=
    networks: ["app-network"]

  webserver:
    build:
      context: .
      dockerfile: ./services/webserver/Dockerfile
    environment:
      - MONGO_URL=mongodb://mongodb:27017/jobs_db
      - RABBIT_URL=amqp://rabbitmq
    networks: ["app-network"]

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBIT_URL=amqp://rabbitmq
    networks: ["app-network"]

  # --- HAProxy ---
  haproxy:
    image: haproxy:latest
    container_name: haproxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./localhost.pem:/usr/local/etc/haproxy/certs/localhost.pem:ro
    depends_on:
      - auth-service
      - webserver
      - notification-service
    networks: ["app-network"]

networks:
  app-network:
    driver: bridge
  data_plane:    # for the traffic of Producer, Rabbit and Worker
  control_plane: # for Monitoring, Redis and the Regulator